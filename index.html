  <meta charset="utf-8" />

  <title>PU4FOS</title>
  <style>
    :root {
      --bg: #090909;
      --panel: #111111;
      --panel-2: #151515;
      --gold: #d4af37;
      --gold-soft: rgba(212, 175, 55, 0.18);
      --text: #f2f2f2;
      --muted: #b7b7b7;
      --line: rgba(212, 175, 55, 0.35);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.12), transparent 32%),
        linear-gradient(180deg, #0e0e0e 0%, #070707 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 18px 14px 28px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero {
      display: grid;
      place-items: center;
      padding: 10px 0 2px;
    }

    .banner-wrap {
      width: min(300px, 100%);
      height: 150px;
      display: grid;
      place-items: center;
      position: relative;
      filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.55));
    }

    .banner-wrap::before {
      content: "";
      position: absolute;
      inset: 14px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(212,175,55,0.12), rgba(212,175,55,0.02));
      border: 1px solid rgba(212,175,55,0.25);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      pointer-events: none;
    }

    .banner-img {
      width: 300px;
      height: 150px;
      object-fit: contain;
      position: relative;
      z-index: 1;
    }

    .banner-fallback {
      display: none;
      width: 300px;
      height: 150px;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 16px;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01)), var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 18px 16px 14px;
      border-bottom: 1px solid rgba(212,175,55,0.18);
      background: linear-gradient(180deg, rgba(212,175,55,0.08), transparent);
    }

    .title {
      margin: 0;
      font-size: clamp(1.2rem, 4vw, 1.65rem);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .links-box {
      padding: 8px;
    }

    .links-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .link-item {
      border: 1px solid rgba(212,175,55,0.22);
      background: linear-gradient(180deg, rgba(212,175,55,0.07), rgba(255,255,255,0.02));
      border-radius: 14px;
      overflow: hidden;
    }

    .link-item a {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 14px 14px 13px;
      color: var(--text);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .link-item a:active {
      transform: translateY(1px);
    }

    .link-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff4c8;
    }

    .link-url {
      font-size: 0.83rem;
      color: var(--muted);
      word-break: break-all;
    }

    .link-item:hover,
    .link-item:focus-within {
      border-color: rgba(212,175,55,0.5);
      box-shadow: inset 0 0 0 1px rgba(212,175,55,0.08);
    }

    .footer {
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 0.78rem;
      padding: 4px 10px 0;
    }

    @media (min-width: 720px) {
      .page { padding-top: 28px; }
      .panel-head { padding: 22px 22px 16px; }
      .links-box { padding: 12px; }
      .link-item a { padding: 16px 16px 15px; }
    }
  </style>
  <meta name="google-adsense-account" content="ca-pub-2979531486195420">

<body>
  <main class="page">
    <section class="shell" aria-label="Página de links">
      <header class="hero">
        <div class="banner-wrap" aria-label="Banner do topo">
          <img
            class="banner-img"
            src="logo.png"
            alt="Banner"
            width="300"
            height="150"
            onerror="this.style.display='none';document.getElementById('banner-fallback').style.display='flex';"
          />
          <div class="banner-fallback" id="banner-fallback">~</div>
        </div>
      </header>

      <section class="panel">
        <div class="panel-head">
          <h1 class="title"><a href="https://www.qrz.com/db/PU4FOS">PU4FOS</a></h1>
          <p class="subtitle">Maidenhead GH80ae • Belo Horizonte/MG • Brasil</p>
        </div>

        <div class="links-box">
          <ul class="links-list">
            <li class="link-item">
              <a href="https://pu4fos.github.io/repplot" target="_blank" rel="noopener noreferrer">
                <span class="link-title">Repetidoras Anatel</span>
                <span class="link-url">https://pu4fos.github.io/repplot</span>
              </a>
            </li>

            <li class="link-item">
              <a href="https://pu4fos.github.io/twqsl" target="_blank" rel="noopener noreferrer">
                <span class="link-title">Assinador de logs LoTW</span>
                <span class="link-url">https://pu4fos.github.io/twqsl</span>
              </a>
            </li>

            <!--
            Exemplo para adicionar novo link:

              <a href="https://seu-link" target="_blank" rel="noopener noreferrer">
                <span class="link-title">Nome do link</span>
                <span class="link-url">https://seu-link</span>
              </a>
            </li>
            -->
          </ul>
        </div>
      </section>

      <div class="footer">PU4FOS • 2026</div>
    </section>
  </main>
</body>
